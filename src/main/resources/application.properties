spring.application.name=Backend_Cake-Tea
server.port=8080
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/teaandcake?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Admin credentials
admin.username=admin
admin.password=admin123

# Upload directory (đường dẫn tuyệt đối tương đối working directory khi chạy)
app.upload.dir=uploads

# Multipart upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Mail config (cấu hình SMTP thật khi triển khai)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Combo - Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/list.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='combos')}"></div>
        <div class="main-content">
            <div class="list add flex-col">
                <p>Quản lý Combo dịp lễ</p>
                <form id="combo-form" class="flex-col" style="margin-bottom: 20px; gap: 10px;">
                    <input type="hidden" id="combo-id">
                    <input type="text" id="combo-name" placeholder="Tên combo" required>
                    <textarea id="combo-description" placeholder="Mô tả" rows="2"></textarea>
                    <input type="number" id="combo-price" placeholder="Giá combo (VNĐ)" min="0" required>
                    <label>Bắt đầu: <input type="datetime-local" id="combo-start"></label>
                    <label>Kết thúc: <input type="datetime-local" id="combo-end"></label>
                    <label><input type="checkbox" id="combo-active" checked> Đang hoạt động</label>
                    <div id="combo-items-section">
                        <p>Sản phẩm trong combo:</p>
                        <div id="combo-items-list"></div>
                        <button type="button" id="add-combo-item-btn" class="add-btn" style="width: 180px; margin-top: 10px;">+ Thêm sản phẩm</button>
                    </div>
                    <button type="submit" class="add-btn" style="width: 200px;">Lưu combo</button>
                </form>
                <div class="list-table">
                    <div class="list-table-format title">
                        <b>Tên</b>
                        <b>Giá</b>
                        <b>Số SP</b>
                        <b>Trạng thái</b>
                        <b>Thao tác</b>
                    </div>
                    <div id="combo-list-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
    <script th:src="@{/admin/js/combos.js}"></script>
</body>
</html>

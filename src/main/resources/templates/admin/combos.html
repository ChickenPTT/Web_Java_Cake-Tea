<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Combo - Sugar Petals Admin</title>
    <th:block th:replace="~{admin/layout/css :: css}"></th:block>
</head>
<body>
<div class="container-scroller">
    <div th:replace="~{admin/layout/header :: header}"></div>
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{admin/layout/menu :: menu('combos')}"></div>
        <div class="main-panel">
            <div class="content-wrapper form-page">
                <div class="page-header">
                    <h3 class="page-title">Quản lý Combo</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/admin}">Bảng điều khiển</a></li>
                            <li class="breadcrumb-item active">Combo</li>
                        </ol>
                    </nav>
                </div>
                <section class="content">
                    <div class="card rounded shadow mb-3">
                        <div class="card-body">
                            <form id="combo-form">
                                <input type="hidden" id="combo-id">
                                <div class="row">
                                    <div class="col-md-6 form-group"><label>Tên combo</label><input type="text" id="combo-name" class="form-control" required></div>
                                    <div class="col-md-6 form-group"><label>Giá combo (VNĐ)</label><input type="number" id="combo-price" class="form-control" min="0" required></div>
                                    <div class="col-12 form-group"><label>Mô tả</label><textarea id="combo-description" class="form-control" rows="2"></textarea></div>
                                    <div class="col-md-4 form-group"><label>Bắt đầu</label><input type="datetime-local" id="combo-start" class="form-control"></div>
                                    <div class="col-md-4 form-group"><label>Kết thúc</label><input type="datetime-local" id="combo-end" class="form-control"></div>
                                    <div class="col-md-4 form-group d-flex align-items-end"><label><input type="checkbox" id="combo-active" checked> Hoạt động</label></div>
                                    <div class="col-12">
                                        <p class="font-weight-bold">Sản phẩm trong combo:</p>
                                        <div id="combo-items-list"></div>
                                        <button type="button" id="add-combo-item-btn" class="btn btn-sm btn-outline-success mt-2">+ Thêm sản phẩm</button>
                                    </div>
                                    <div class="col-12 mt-3"><button type="submit" class="btn btn-success"><i class="mdi mdi-content-save"></i> Lưu combo</button></div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="card rounded shadow">
                        <div class="card-body table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>Tên</th><th>Giá</th><th>SP</th><th>TT</th><th>Thao tác</th></tr></thead>
                                <tbody id="combo-list-container"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
<script th:src="@{/admin/js/combos.js}"></script>
</body>
</html>

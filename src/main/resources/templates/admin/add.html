<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm sản phẩm - Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/add.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='add')}"></div>
        <div class="main-content">
            <div class="add">
                <form class="flex-col" id="add-form">
                    <div class="add-img-upload flex-col">
                        <p>Upload ảnh</p>
                        <label for="image">
                            <img id="image-preview" th:src="@{/admin/assets/upload_area.png}" alt="">
                        </label>
                        <input type="file" id="image" accept="image/*">
                    </div>
                    <div class="add-product-name flex-col">
                        <p>Tên sản phẩm</p>
                        <input type="text" name="name" placeholder="Nhập tên" required>
                    </div>
                    <div class="add-product-description flex-col">
                        <p>Mô tả</p>
                        <textarea name="description" rows="6" placeholder="Mô tả sản phẩm" required></textarea>
                    </div>
                    <div class="add-category-price">
                        <div class="add-category flex-col">
                            <p>Danh mục</p>
                            <select name="category" id="category-select" required>
                                <option value="">-- Chọn danh mục --</option>
                            </select>
                        </div>
                        <div class="add-price flex-col">
                            <p>Giá (VNĐ)</p>
                            <input type="number" name="price" placeholder="50000" min="0" required>
                        </div>
                    </div>
                    <button type="submit" class="add-btn">THÊM SẢN PHẨM</button>
                </form>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
    <script th:src="@{/admin/js/add.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sản phẩm - Sugar Petals Admin</title>
    <th:block th:replace="~{admin/layout/css :: css}"></th:block>
</head>
<body>
<div class="container-scroller">
    <div th:replace="~{admin/layout/header :: header}"></div>
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{admin/layout/menu :: menu('add')}"></div>
        <div class="main-panel">
            <div class="content-wrapper form-page">
                <div class="page-header">
                    <h3 class="page-title" id="page-title">Thêm sản phẩm</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/admin}">Bảng điều khiển</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/admin/products}">Sản phẩm</a></li>
                            <li class="breadcrumb-item active" id="breadcrumb-action">Thêm mới</li>
                        </ol>
                    </nav>
                </div>
                <section class="content">
                    <div class="card rounded shadow">
                        <div class="card-body">
                            <form id="add-form">
                                <input type="hidden" id="product-id">
                                <div class="row">
                                    <div class="col-md-4 text-center mb-3">
                                        <label class="d-block font-weight-bold mb-2">Ảnh sản phẩm</label>
                                        <label for="image" style="cursor:pointer;">
                                            <img id="image-preview" th:src="@{/admin/assets/upload_area.png}" alt="" class="img-fluid rounded" style="max-height:200px;">
                                        </label>
                                        <input type="file" id="image" accept="image/*" class="form-control-file mt-2">
                                        <input type="hidden" id="existing-image">
                                    </div>
                                    <div class="col-md-8">
                                        <div class="form-group">
                                            <label>Tên sản phẩm *</label>
                                            <input type="text" name="name" id="product-name" class="form-control" required>
                                        </div>
                                        <div class="form-group">
                                            <label>Slug</label>
                                            <input type="text" name="slug" id="product-slug" class="form-control"
                                                   placeholder="tu-dong-tao-tu-ten" readonly>
                                            <div class="form-check mt-2">
                                                <input class="form-check-input" type="checkbox" id="product-slug-auto" checked>
                                                <label class="form-check-label" for="product-slug-auto">
                                                    Tự động tạo slug từ tên
                                                </label>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label>Mô tả *</label>
                                            <textarea name="description" id="product-description" class="form-control" rows="4" required></textarea>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 form-group">
                                                <label>Danh mục *</label>
                                                <select name="category" id="category-select" class="form-control" required>
                                                    <option value="">-- Chọn danh mục --</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 form-group">
                                                <label>Giá (VNĐ) *</label>
                                                <input type="number" name="price" id="product-price" class="form-control" min="0" required>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-success" id="submit-btn">
                                            <i class="mdi mdi-content-save mr-1"></i> Lưu sản phẩm
                                        </button>
                                        <a th:href="@{/admin/products}" class="btn btn-light">Hủy</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
<script th:src="@{/admin/js/add.js}"></script>
</body>
</html>

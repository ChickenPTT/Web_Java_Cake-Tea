<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiến dịch giảm giá - Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/list.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='campaigns')}"></div>
        <div class="main-content">
            <div class="list add flex-col">
                <p>Quản lý chiến dịch giảm giá</p>
                <form id="campaign-form" class="flex-col" style="margin-bottom: 20px; gap: 10px;">
                    <input type="hidden" id="campaign-id">
                    <input type="text" id="campaign-name" placeholder="Tên chiến dịch (vd: Tết 2026)" required>
                    <textarea id="campaign-description" placeholder="Mô tả" rows="3"></textarea>
                    <input type="number" id="campaign-discount-percent" placeholder="Giảm % (vd: 10)" min="0" max="100">
                    <input type="number" id="campaign-discount-amount" placeholder="Giảm số tiền (VNĐ)" min="0">
                    <input type="text" id="campaign-target-category" placeholder="Danh mục áp dụng (để trống = tất cả)">
                    <label>Bắt đầu: <input type="datetime-local" id="campaign-start" required></label>
                    <label>Kết thúc: <input type="datetime-local" id="campaign-end" required></label>
                    <label><input type="checkbox" id="campaign-active" checked> Đang hoạt động</label>
                    <button type="submit" class="add-btn" style="width: 200px;">Lưu chiến dịch</button>
                </form>
                <div class="list-table">
                    <div class="list-table-format title">
                        <b>Tên</b>
                        <b>Giảm giá</b>
                        <b>Thời gian</b>
                        <b>Trạng thái</b>
                        <b>Thao tác</b>
                    </div>
                    <div id="campaign-list-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
    <script th:src="@{/admin/js/campaigns.js}"></script>
</body>
</html>

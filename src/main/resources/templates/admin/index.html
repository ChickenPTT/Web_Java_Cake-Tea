<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sugar Petals</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='dashboard')}"></div>
        <div class="main-content">
            <div class="welcome-section">
                <h2>Chào mừng đến Admin Panel</h2>
                <p>Chọn chức năng từ sidebar để quản lý cửa hàng.</p>
                <div class="dashboard-cards">
                    <div class="card">
                        <h3>Tổng sản phẩm</h3>
                        <p id="total-items">0</p>
                    </div>
                    <div class="card">
                        <h3>Tổng đơn hàng</h3>
                        <p id="total-orders">0</p>
                    </div>
                    <div class="card">
                        <h3>Đơn chờ xử lý</h3>
                        <p id="pending-orders">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
</body>
</html>

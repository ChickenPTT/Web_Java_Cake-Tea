<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/admin/extensions/images/brand-logo.png}" rel="shortcut icon" type="image/png"/>
    <title>Dashboard - Sugar Petals Admin</title>
    <th:block th:replace="~{admin/layout/css :: css}"></th:block>
</head>
<body>
<div class="container-scroller">
    <div th:replace="~{admin/layout/header :: header}"></div>
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{admin/layout/menu :: menu('dashboard')}"></div>
        <div class="main-panel">
            <div class="content-wrapper">
                <section class="content mb-3">
                    <div class="d-xl-flex justify-content-between align-items-start">
                        <h2 class="text-dark font-weight-bold mb-2">Dashboard</h2>
                    </div>
                </section>

                <section class="content">
                    <div class="row form-group">
                        <div class="col-xl-4 col-lg-6 col-sm-6 mb-3">
                            <div class="d-flex bg-white p-3 align-items-center rounded shadow h-100">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-dropbox icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Tổng sản phẩm</h5>
                                    <p class="font-weight-bold text-dark mb-0" id="total-items" style="font-size:28px;">0</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/orders}" class="d-flex bg-white p-3 align-items-center rounded shadow h-100 text-decoration-none">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-shopping icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Tổng đơn hàng</h5>
                                    <p class="font-weight-bold text-dark mb-0" id="total-orders" style="font-size:28px;">0</p>
                                </div>
                            </a>
                        </div>
                        <div class="col-xl-4 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/orders}" class="d-flex bg-white p-3 align-items-center rounded shadow h-100 text-decoration-none">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-clock-outline icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Đơn chờ xử lý</h5>
                                    <p class="font-weight-bold text-dark mb-0" id="pending-orders" style="font-size:28px;">0</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </section>

                <section class="content">
                    <div class="row form-group">
                        <div class="col-xl-3 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/categories}" class="d-flex bg-white p-3 align-items-center rounded shadow">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-filter icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Danh mục</h5>
                                    <p class="font-weight-bold text-dark mb-0">Quản lý</p>
                                </div>
                            </a>
                        </div>
                        <div class="col-xl-3 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/products}" class="d-flex bg-white p-3 align-items-center rounded shadow">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-cupcake icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Sản phẩm</h5>
                                    <p class="font-weight-bold text-dark mb-0">Chi tiết</p>
                                </div>
                            </a>
                        </div>
                        <div class="col-xl-3 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/campaigns}" class="d-flex bg-white p-3 align-items-center rounded shadow">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-ticket-confirmation icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Chiến dịch</h5>
                                    <p class="font-weight-bold text-dark mb-0">Giảm giá</p>
                                </div>
                            </a>
                        </div>
                        <div class="col-xl-3 col-lg-6 col-sm-6 mb-3">
                            <a th:href="@{/admin/statistics}" class="d-flex bg-white p-3 align-items-center rounded shadow">
                                <div class="dashboard-link-icon text-center">
                                    <div class="dashboard-progress d-flex align-items-center justify-content-center item-parent position-relative">
                                        <i class="mdi mdi-chart-line icon-md absolute-center text-gradient-right"></i>
                                    </div>
                                </div>
                                <div class="dashboard-link-text ml-3">
                                    <h5 class="mb-0 text-gradient-right font-weight-bold">Thống kê</h5>
                                    <p class="font-weight-bold text-dark mb-0">Doanh số</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </section>

                <section class="content mt-2">
                    <div class="row">
                        <div class="col-lg-8 mb-3">
                            <div class="card rounded shadow h-100">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h5 class="card-title mb-0">Doanh thu 7 ngày gần nhất</h5>
                                        <span class="badge badge-success" id="week-revenue-badge">0 đ</span>
                                    </div>
                                    <canvas id="revenue-chart" height="120"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4 mb-3">
                            <div class="card rounded shadow h-100">
                                <div class="card-body">
                                    <h5 class="card-title mb-3">Trạng thái đơn hàng</h5>
                                    <canvas id="status-chart" height="220"></canvas>
                                    <p id="status-chart-empty" class="text-muted text-center d-none mb-0 mt-3">Chưa có đơn hàng</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 mb-3">
                            <div class="card rounded shadow">
                                <div class="card-body">
                                    <h5 class="card-title mb-3">Số đơn theo ngày (7 ngày)</h5>
                                    <canvas id="orders-chart" height="80"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/admin/js/dashboard-charts.js}"></script>
</body>
</html>

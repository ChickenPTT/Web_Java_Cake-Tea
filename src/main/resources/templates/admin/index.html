<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sugar Petals</title>
    <link rel="stylesheet" href="/admin/css/style.css" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" href="/admin/css/navbar.css" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" href="/admin/css/sidebar.css" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" href="/admin/css/dashboard.css" th:href="@{/admin/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <img class="logo" src="/admin/assets/logo.png" th:src="@{/admin/assets/logo.png}" alt="">
            <div class="site-info">
                <h1 class="site-name">Sugar Petals</h1>
                <p class="site-slogan">Admin Panel</p>
            </div>
        </div>
        <div class="navbar-right">
            <img class="profile" src="/admin/assets/profile_image.png" th:src="@{/admin/assets/profile_image.png}" alt="">
            <button onclick="adminLogout()" class="logout-btn">Logout</button>
        </div>
    </div>
    <hr>
    <div class="app-content">
        <div class="sidebar">
            <div class="sidebar-options">
                <a href="add.html" class="sidebar-option" id="nav-add">
                    <img src="/admin/assets/add_icon.png" th:src="@{/admin/assets/add_icon.png}" alt="">
                    <p>Add Items</p>
                </a>
                <a href="list.html" class="sidebar-option" id="nav-list">
                    <img src="/admin/assets/order_icon.png" th:src="@{/admin/assets/order_icon.png}" alt="">
                    <p>List Items</p>
                </a>
                <a href="orders.html" class="sidebar-option" id="nav-orders">
                    <img src="/admin/assets/order_icon.png" th:src="@{/admin/assets/order_icon.png}" alt="">
                    <p>Orders</p>
                </a>
            </div>
        </div>
        <div class="main-content">
            <div class="welcome-section">
                <h2>Welcome to Admin Panel</h2>
                <p>Select an option from the sidebar to manage your bakery.</p>
                <div class="dashboard-cards">
                    <div class="card">
                        <h3>Total Items</h3>
                        <p id="total-items">0</p>
                    </div>
                    <div class="card">
                        <h3>Total Orders</h3>
                        <p id="total-orders">0</p>
                    </div>
                    <div class="card">
                        <h3>Pending Orders</h3>
                        <p id="pending-orders">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin/js/main.js" th:src="@{/admin/js/main.js}"></script>
</body>
</html>

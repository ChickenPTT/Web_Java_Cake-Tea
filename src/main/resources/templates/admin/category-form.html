<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh mục - Sugar Petals Admin</title>
    <th:block th:replace="~{admin/layout/css :: css}"></th:block>
</head>
<body>
<div class="container-scroller">
    <div th:replace="~{admin/layout/header :: header}"></div>
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{admin/layout/menu :: menu('categories')}"></div>
        <div class="main-panel">
            <div class="content-wrapper form-page">
                <div class="page-header">
                    <h3 class="page-title" id="page-title">Thêm danh mục</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/admin}">Bảng điều khiển</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/admin/categories}">Danh mục</a></li>
                            <li class="breadcrumb-item active" id="breadcrumb-action">Thêm mới</li>
                        </ol>
                    </nav>
                </div>
                <section class="content">
                    <div class="card rounded shadow">
                        <div class="card-body">
                            <form id="category-form">
                                <input type="hidden" id="category-id">
                                <div class="row">
                                    <div class="col-md-4 text-center mb-3">
                                        <label class="d-block font-weight-bold mb-2">Ảnh danh mục</label>
                                        <label for="category-image-file" style="cursor:pointer;">
                                            <img id="category-image-preview" th:src="@{/admin/assets/upload_area.png}"
                                                 alt="" class="img-fluid rounded" style="max-height:200px;">
                                        </label>
                                        <input type="file" id="category-image-file" accept="image/*" class="form-control-file mt-2">
                                        <input type="hidden" id="category-image">
                                    </div>
                                    <div class="col-md-8">
                                        <div class="form-group">
                                            <label>Tên danh mục *</label>
                                            <input type="text" id="category-name" class="form-control" required>
                                        </div>
                                        <div class="form-group">
                                            <label>Slug</label>
                                            <input type="text" id="category-slug" class="form-control"
                                                   placeholder="tu-dong-tao-tu-ten" readonly>
                                            <div class="form-check mt-2">
                                                <input class="form-check-input" type="checkbox" id="category-slug-auto" checked>
                                                <label class="form-check-label" for="category-slug-auto">
                                                    Tự động tạo slug từ tên
                                                </label>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-success" id="submit-btn">
                                            <i class="mdi mdi-content-save mr-1"></i> Lưu danh mục
                                        </button>
                                        <a th:href="@{/admin/categories}" class="btn btn-light">Hủy</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
<script th:src="@{/admin/js/category-form.js}"></script>
</body>
</html>

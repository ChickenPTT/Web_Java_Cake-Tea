<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/list.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='categories')}"></div>
        <div class="main-content">
            <div class="list add flex-col">
                <p>Quản lý danh mục sản phẩm</p>
                <form id="category-form" class="flex-col" style="margin-bottom: 20px; gap: 10px;">
                    <input type="hidden" id="category-id">
                    <input type="text" id="category-name" placeholder="Tên danh mục" required>
                    <input type="text" id="category-image" placeholder="URL ảnh (vd: /user/assets/menu_1.jpg)">
                    <button type="submit" class="add-btn" style="width: 200px;">Lưu danh mục</button>
                </form>
                <div class="list-table">
                    <div class="list-table-format title">
                        <b>ID</b>
                        <b>Tên danh mục</b>
                        <b>Ảnh</b>
                        <b>Thao tác</b>
                    </div>
                    <div id="category-list-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
    <script th:src="@{/admin/js/categories.js}"></script>
</body>
</html>

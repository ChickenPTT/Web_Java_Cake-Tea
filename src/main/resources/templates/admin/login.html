<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/admin/extensions/images/brand-logo.png}" rel="shortcut icon" type="image/png"/>
    <title>Đăng nhập - Sugar Petals Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link th:href="@{/admin/themes/mdi/css/materialdesignicons.min.css}" rel="stylesheet">
    <link th:href="@{/admin/themes/css/vendor.bundle.base.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link th:href="@{/admin/extensions/css/login.css}" rel="stylesheet">
    <link th:href="@{/admin/extensions/css/admin-custom.css}" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .bg-linear-gradient { background: linear-gradient(0, #a50b18 0%, #c70e1c 50%, #e85d6f 100%); }
        .auth-form-light { background-image: url('/admin/extensions/images/footer_auth.png') !important; background-position: bottom !important; background-repeat: no-repeat !important; }
        span.span__wellcome_text { color: #FFF; text-shadow: 0 4px 4px rgba(0,0,0,.25); font-size: 42px; font-weight: 800; text-transform: uppercase; margin-top: -40px; display: block; }
        span.span__wellcome { -webkit-text-stroke: 1px rgba(255,255,255,.5); font-size: 80px; font-weight: 900; color: transparent; display: block; text-transform: uppercase; }
        .auth_login_info_item p { color: #FFF; font-size: 22px; font-weight: 700; }
        .auth_login_info_item small { color: #FFF; font-size: 15px; font-weight: 500; line-height: 1.8; }
    </style>
</head>
<body>
<div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper auth">
            <div class="row">
                <div class="col-lg-2 hidden-md d-none d-lg-block"></div>
                <div class="col-lg-10 bg-linear-gradient col-md-12">
                    <div class="auth-form-light text-left">
                        <div class="brand-logo">
                            <a th:href="@{/}">
                                <img th:src="@{/admin/extensions/images/brand-logo.png}" alt="Sugar Petals" style="max-height:60px;">
                            </a>
                        </div>
                        <form id="admin-login-form">
                            <div class="form-floating form-floating-outline mb-4">
                                <input type="text" class="form-control" id="username" placeholder="Tài khoản" required autocomplete="off">
                                <label for="username">Tên đăng nhập</label>
                            </div>
                            <div class="mb-4">
                                <div class="form-password-toggle">
                                    <div class="input-group input-group-merge">
                                        <div class="form-floating form-floating-outline flex-grow-1">
                                            <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                                            <label for="password">Mật khẩu</label>
                                        </div>
                                        <span class="input-group-text cursor-pointer show-password" onclick="togglePassword()">
                                            <span class="fas fa-eye" id="toggle-eye"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-block btn-success btn-lg font-weight-medium auth-form-btn w-100 mb-3">
                                <span>Đăng nhập</span>
                            </button>
                            <div id="login-alert" class="alert alert-danger d-none mb-0" role="alert"></div>
                            <a class="mt-3 text-center d-flex justify-content-center align-items-center gap-2" th:href="@{/}" target="_blank">
                                <i class="fas fa-arrow-left mr-2"></i> Xem website
                            </a>
                        </form>
                        <div class="text-center mt-4 text-copyright">
                            <span class="text-copyright-text mt-3 d-block">Copyright © Sugar Petals - 2026</span>
                        </div>
                    </div>
                    <div class="auth_login_info d-none d-md-block">
                        <div class="auth_login_info_item">
                            <span class="span__wellcome">Welcome to</span>
                            <span class="span__wellcome_text mb-4">Sugar Petals<br>Trà &amp; Bánh</span>
                            <small>
                                Cửa hàng online giới thiệu và bán sản phẩm Trà &amp; Bánh.<br>
                                Quản lý sản phẩm, đơn hàng, chiến dịch và khách hàng.
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/admin/extensions/js/jquery.min.js}"></script>
<script th:src="@{/admin/themes/js/vendor.bundle.base.js}"></script>
<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const eye = document.getElementById('toggle-eye');
        if (input.type === 'password') {
            input.type = 'text';
            eye.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            eye.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
    // Chỉ chuyển vào /admin khi session Spring Security còn hiệu lực
    // (tránh loop: localStorage true nhưng chưa đăng nhập → /admin → /admin/login → /admin ...)
    (async function checkAdminSession() {
        if (localStorage.getItem('adminLoggedIn') !== 'true') return;
        try {
            const res = await fetch('/api/admin/dashboard/stats', { credentials: 'same-origin' });
            if (res.ok) {
                window.location.replace('/admin');
            } else {
                localStorage.removeItem('adminLoggedIn');
            }
        } catch (_) {
            localStorage.removeItem('adminLoggedIn');
        }
    })();

    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alert = document.getElementById('login-alert');
        alert.classList.add('d-none');
        try {
            const res = await fetch('/api/admin/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.replace('/admin');
            } else {
                localStorage.removeItem('adminLoggedIn');
                alert.textContent = data.message || 'Đăng nhập thất bại';
                alert.classList.remove('d-none');
            }
        } catch (err) {
            localStorage.removeItem('adminLoggedIn');
            alert.textContent = 'Lỗi kết nối server';
            alert.classList.remove('d-none');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chăm sóc khách hàng - Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css}">
    <link rel="stylesheet" th:href="@{/admin/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/admin/css/list.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
    <hr>
    <div class="app-content">
        <div th:replace="~{admin/fragments/sidebar :: sidebar(active='customers')}"></div>
        <div class="main-content">
            <div class="list add flex-col">
                <p>Chăm sóc khách hàng - Sinh nhật hôm nay</p>
                <div id="birthday-today-container" style="margin-bottom: 30px;"></div>
                <p>Tất cả khách hàng</p>
                <div class="list-table">
                    <div class="list-table-format title">
                        <b>ID</b>
                        <b>Tên</b>
                        <b>Email</b>
                        <b>Sinh nhật</b>
                        <b>Thao tác</b>
                    </div>
                    <div id="customer-list-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/admin/js/main.js}"></script>
    <script th:src="@{/admin/js/customers.js}"></script>
</body>
</html>

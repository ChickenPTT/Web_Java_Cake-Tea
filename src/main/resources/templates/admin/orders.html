<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đơn hàng - Sugar Petals Admin</title>
    <th:block th:replace="~{admin/layout/css :: css}"></th:block>
</head>
<body>
<div class="container-scroller">
    <div th:replace="~{admin/layout/header :: header}"></div>
    <div class="container-fluid page-body-wrapper">
        <div th:replace="~{admin/layout/menu :: menu('orders')}"></div>
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="page-header">
                    <h3 class="page-title">Quản lý đơn hàng</h3>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/admin}">Bảng điều khiển</a></li>
                            <li class="breadcrumb-item active">Đơn hàng</li>
                        </ol>
                    </nav>
                </div>
                <section class="content">
                    <div class="card rounded shadow">
                        <div class="card-body" id="order-list-container"></div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{admin/layout/js :: js}"></th:block>
<script th:src="@{/admin/js/orders.js}"></script>
</body>
</html>
